# Conf nginx de référence pour GrabDiscount — à déployer sur
# /etc/nginx/sites-enabled/grabdiscount sur le VPS.
#
# Topologie :
#   Internet ─► Cloudflare ─► nginx (ici) ─► Flask sur 127.0.0.1
#
# UFW ferme 5001/5002/8080 au net. Nginx est le SEUL point d'entrée public,
# les apps Flask binden localhost-only → double cloison.
#
# Stratégie de bascule dashboard legacy → v2 :
#   Phase A           : tout le trafic → legacy 5001
#   Phase B (actuel)  : /v2/* → nouveau 5002, reste → legacy 5001
#   Phase C (bascule) : tout → nouveau 5002, legacy arrêté

# ─── Cloudflare real IP ─────────────────────────────────────────────────
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 131.0.72.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
real_ip_header CF-Connecting-IP;

# ─── Rate limiting ──────────────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=grab_login:10m rate=20r/m;
limit_req_zone $binary_remote_addr zone=grab_api:10m rate=200r/m;
# Zone dédiée v2 pour pouvoir throttle différemment en phase de test
limit_req_zone $binary_remote_addr zone=grab_v2:10m rate=200r/m;

server {
    listen 80;
    server_name passfooddelivery.online www.passfooddelivery.online;

    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    proxy_read_timeout 120s;
    proxy_cookie_path / /;

    # ─── API publique Mini App (Cloudflare cache-friendly) ──────────────
    location = /api/restaurants {
        proxy_pass http://127.0.0.1:5001;
    }

    # ─── Health probe v2 direct (UptimeRobot) ───────────────────────────
    # Ping la nouvelle app sans exposer toute l'interface v2.
    location = /health/v2 {
        access_log off;
        proxy_pass http://127.0.0.1:5002/api/health;
    }

    # ─── Dashboard v2 (Phase B — test en parallèle) ─────────────────────
    # URLs publiques : https://passfooddelivery.online/v2/...
    # Flask reçoit /v2/api/... — X-Forwarded-Prefix + rewrite strippent /v2.
    location /v2/ {
        limit_req zone=grab_v2 burst=100 nodelay;
        proxy_set_header X-Forwarded-Prefix /v2;
        rewrite ^/v2/(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:5002;
    }

    # ─── Login legacy (rate limited explicitement) ──────────────────────
    location = /login {
        limit_req zone=grab_login burst=5 nodelay;
        proxy_pass http://127.0.0.1:5001;
    }

    # ─── Tout le reste → dashboard legacy ───────────────────────────────
    location / {
        limit_req zone=grab_api burst=50 nodelay;
        proxy_pass http://127.0.0.1:5001;
    }
}
